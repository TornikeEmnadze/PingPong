version: '3.8'

services:
  # Blue Environment - Port 3001
  blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pingpong-blue
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ENVIRONMENT=blue
    networks:
      - pingpong-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Green Environment - Port 3002
  green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pingpong-green
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - ENVIRONMENT=green
    networks:
      - pingpong-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Nginx Load Balancer - Port 3000
  nginx:
    image: nginx:alpine
    container_name: pingpong-nginx
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - blue
      - green
    networks:
      - pingpong-network
    restart: unless-stopped

networks:
  pingpong-network:
    driver: bridge

volumes:
  blue_data:
  green_data:
