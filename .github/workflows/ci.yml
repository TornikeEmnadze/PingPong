name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint client
        working-directory: client
        run: npm run lint

      - name: Test client
        working-directory: client
        run: npm test -- --run

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Test server
        working-directory: server
        run: npm test -- --coverage

      - name: Upload server coverage
        if: always() && hashFiles('server/coverage/coverage-final.json') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage/coverage-final.json
          flags: server
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pingpong:latest

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            server/dist
            client/dist
          retention-days: 7

  deploy:
    name: Blue-Green Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build

    # Deploy only after code is pushed/merged into main.
    # Pull requests run tests and build, but they do not deploy.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production-green

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy Green environment without switching production traffic
        id: deploy_green
        run: |
          echo "Deploying new version as GREEN environment..."
          DEPLOYMENT_URL=$(vercel deploy --prod --skip-domain --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Green deployment URL: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke test Green deployment
        run: |
          echo "Running smoke test against GREEN deployment..."
          echo "URL: ${{ steps.deploy_green.outputs.deployment_url }}"

          curl -I \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
            "${{ steps.deploy_green.outputs.deployment_url }}"

          curl -f \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
            "${{ steps.deploy_green.outputs.deployment_url }}" > /dev/null

          echo "✅ Smoke test passed. Green deployment is healthy."

      - name: Promote Green deployment to Production
        run: |
          echo "Promoting GREEN deployment to production..."
          vercel promote "${{ steps.deploy_green.outputs.deployment_url }}" --yes --token=${{ secrets.VERCEL_TOKEN }}
          echo "✅ Green deployment promoted to production."
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Blue-Green deployment summary
        run: |
          echo "✅ Blue-Green deployment completed successfully."
          echo "Previous production deployment = BLUE."
          echo "New verified deployment = GREEN."
          echo "GREEN was promoted only after smoke testing passed."

  pipeline-status:
    name: Pipeline Status Check
    runs-on: ubuntu-latest
    if: always()
    needs: [test, build]

    steps:
      - name: Check test job status
        if: needs.test.result != 'success'
        run: |
          echo "❌ TEST JOB FAILED"
          echo "Tests must pass before deployment."
          exit 1

      - name: Check build job status
        if: needs.build.result != 'success'
        run: |
          echo "❌ BUILD JOB FAILED"
          echo "Build must succeed before deployment."
          exit 1

      - name: Pipeline Status Success
        if: needs.test.result == 'success' && needs.build.result == 'success'
        run: |
          echo "✅ All required checks passed."
          echo "The application is safe to deploy."