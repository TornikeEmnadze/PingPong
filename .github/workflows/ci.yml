name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint client
        working-directory: client
        run: npm run lint

      - name: Test client
        working-directory: client
        run: npm test -- --run

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Test server
        working-directory: server
        run: npm test -- --coverage

      - name: Upload server coverage
        if: always() && hashFiles('server/coverage/coverage-final.json') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage/coverage-final.json
          flags: server
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pingpong:latest

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            server/dist
            client/dist
          retention-days: 7

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        environment: [green]
    environment:
      name: production-${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Deploy to ${{ matrix.environment }} environment
        run: |
          echo "Deploying to ${{ matrix.environment }} environment..."
          echo "Version: ${{ github.sha }}"
          echo "Build number: ${{ github.run_number }}"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests on ${{ matrix.environment }}..."

      - name: Switch traffic
        if: success()
        run: |
          echo "Switching traffic to ${{ matrix.environment }} environment..."

      - name: Verify deployment
        if: success()
        run: |
          echo "✅ Deployment to ${{ matrix.environment }} successful"
          echo "Services are now live: https://your-domain.com"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed - rolling back to previous environment"

  pipeline-status:
    name: Pipeline Status Check
    runs-on: ubuntu-latest
    if: always()
    needs: [test, build]
    steps:
      - name: Check test job status
        if: needs.test.result != 'success'
        run: |
          echo "❌ TEST JOB FAILED"
          echo "Tests must pass before merging"
          exit 1

      - name: Check build job status
        if: needs.build.result != 'success'
        run: |
          echo "❌ BUILD JOB FAILED"
          echo "Build must succeed before merging"
          exit 1

      - name: Pipeline Status Success
        if: needs.test.result == 'success' && needs.build.result == 'success'
        run: |
          echo "✅ All required checks passed!"
          echo "This PR is safe to merge"